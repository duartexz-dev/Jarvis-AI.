<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="interface.css">

    <title>JARVIS Login</title>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark fade-in">
        <span class="navbar-brand" id="res">JARVIS SYSTEM</span>
    </nav>

    <!-- CONTAINER -->
    <div class="main-container">

        <div class="glass-card slide-in">

            <h1 class="title">Bem-vindo</h1>

            <!-- STATUS -->
            <p id="status" style="font-size: 13px; opacity: 0.6; margin-bottom: 15px;">
                Sistema offline
            </p>

            <!-- BOTÃO INICIAR -->
            <button class="btn-big mb-2" onclick="iniciarSistema()">
                Iniciar Sistema
            </button>

            <!-- INPUT -->
            <input id="nomeInput" class="form-control mb-3" placeholder="Digite seu nome">

            <!-- CONFIRMAR -->
            <button class="btn-enter" id="btn-confirm" onclick="confirmarNome()">
                Confirmar
            </button>

            <!-- ENTRAR -->
            <button class="btn btn-enter mt-2" id="btn-enter" onclick="entrarSistema()">
                Entrar
            </button>

        </div>

    </div>

    <script src="Enter.js"></script>

</body>

</html>
