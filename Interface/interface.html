<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/interfaceSystem.css">

    <title>JARVIS OS</title>
</head>

<body>

    <!-- HUD -->
    <div id="hud" class="position-fixed top-0 start-0 w-100 h-100" style="z-index:0; pointer-events:none;"></div>

    <!-- NAVBAR -->
    <nav class="navbar px-4 d-flex align-items-center">
        <span class="navbar-brand" id="welcome"></span>

        <div class="ms-auto d-flex gap-2">
            <button class="btn btn-sm" onclick="ativarVoz()">🎤</button>
            <button class="btn btn-sm" onclick="location.reload()">🔄</button>
        </div>
    </nav>

    <!-- CONTAINER -->
    <div class="container-fluid mt-4">

        <div class="row g-4">

            <!-- SISTEMA -->
            <div class="col-lg-3 col-md-4 col-12">
                <div class="glass-card p-3 h-100">
                    <h5>Sistema</h5>

                    <p id="Status">Inicializando...</p>

                    <div class="progress mt-2" style="height:5px;">
                        <div class="progress-bar progress-bar-animated" style="width:100%"></div>
                    </div>

                    <hr>

                    <small>Comandos rápidos</small>
                    <div class="d-grid gap-2 mt-2">
                        <button class="btn btn-sm" onclick="executarComando('hora')">⏰ Hora</button>
                        <button class="btn btn-sm" onclick="executarComando('data')">📅 Data</button>
                        <button class="btn btn-sm" onclick="executarComando('youtube')">▶️ YouTube</button>
                        <button class="btn btn-sm" onclick="executarComando('google')">🌐 Google</button>
                    </div>
                </div>
            </div>

            <!-- CORE -->
            <div class="col-lg-6 col-md-8 col-12">
                <div class="glass-card p-4 h-100 d-flex flex-column">

                    <!-- HEADER -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="mb-0">JARVIS Console</h4>
                        <span class="badge bg-dark text-light">ONLINE</span>
                    </div>

                    <!-- STATUS CENTRAL -->
                    <div class="flex-grow-1 d-flex flex-column justify-content-center text-center">

                        <div class="mb-3">
                            <div class="p-3 rounded-3"
                                style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);">
                                <h6 class="mb-2">Status do Sistema</h6>
                                <p id="Status" class="mb-0 text-muted">Inicializando...</p>
                            </div>
                        </div>

                        <div class="row text-center mt-3">

                            <div class="col-4">
                                <div class="p-2 rounded-3" style="background: rgba(255,255,255,0.03);">
                                    <small>IA</small><br>
                                    <span class="text-success">Ativa</span>
                                </div>
                            </div>

                            <div class="col-4">
                                <div class="p-2 rounded-3" style="background: rgba(255,255,255,0.03);">
                                    <small>Modo</small><br>
                                    <span>Assistente</span>
                                </div>
                            </div>

                            <div class="col-4">
                                <div class="p-2 rounded-3" style="background: rgba(255,255,255,0.03);">
                                    <small>Memória</small><br>
                                    <span class="text-info">Local</span>
                                </div>
                            </div>

                        </div>

                    </div>

                    <!-- INPUT MODERNO -->
                    <div class="mt-3">

                        <div class="input-group">
                            <input id="pedidoUser" class="form-control input-comand"
                                placeholder="Digite um comando ou fale com o JARVIS...">

                            <button class="btn" onclick="executarComando(pedidoUser.value)">
                                Enviar
                            </button>
                        </div>

                        <div class="d-flex gap-2 mt-2">
                            <button class="btn btn-sm w-100" onclick="ativarVoz()">🎤 Falar</button>
                            <button class="btn btn-sm w-100" onclick="executarComando('hora')">⏰ Hora</button>
                            <button class="btn btn-sm w-100" onclick="executarComando('data')">📅 Data</button>
                        </div>

                    </div>

                </div>
            </div>
            <!-- LOGS -->
            <div class="col-lg-3 col-12">
                <div class="glass-card p-3 h-100 d-flex flex-column">

                    <h5>Logs</h5>

                    <div class="flex-grow-1" style="overflow:auto; max-height:400px;">
                        <table class="table table-sm align-middle">
                            <thead>
                                <tr>
                                    <th>Hora</th>
                                    <th>Ação</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="logs"></tbody>
                        </table>
                    </div>

                    <div class="d-flex gap-2 mt-2">
                        <button class="btn btn-sm w-100" onclick="logs.innerHTML=''">🧹 Limpar</button>
                        <button class="btn btn-sm w-100" onclick="alert('Logs exportados (simulado)')">📤
                            Exportar</button>
                    </div>

                </div>
            </div>

        </div>

        <!-- PAINEL EXTRA -->
        <div class="row mt-4 g-4">

            <!-- INFO SISTEMA -->
            <div class="col-md-4">
                <div class="glass-card p-3">
                    <h5>Informações</h5>
                    <ul class="list-unstyled mt-2">
                        <li>🧠 IA: Online</li>
                        <li>⚡ Status: Ativo</li>
                        <li>💾 Armazenamento: Local</li>
                    </ul>
                </div>
            </div>

            <!-- AÇÕES -->
            <div class="col-md-4">
                <div class="glass-card p-3">
                    <h5>Ações</h5>
                    <div class="d-grid gap-2 mt-2">
                        <button class="btn btn-sm" onclick="executarComando('github')">💻 GitHub</button>
                        <button class="btn btn-sm" onclick="executarComando('instagram')">📸 Instagram</button>
                        <button class="btn btn-sm" onclick="executarComando('nome')">👤 Nome</button>
                    </div>
                </div>
            </div>

            <!-- MONITOR (fake futurista) -->
            <div class="col-md-4">
                <div class="glass-card p-3">
                    <h5>Monitor</h5>

                    <div class="mt-2">
                        <small>CPU</small>
                        <div class="progress mb-2">
                            <div class="progress-bar" style="width: 45%"></div>
                        </div>

                        <small>Memória</small>
                        <div class="progress mb-2">
                            <div class="progress-bar" style="width: 70%"></div>
                        </div>

                        <small>Rede</small>
                        <div class="progress">
                            <div class="progress-bar" style="width: 30%"></div>
                        </div>
                    </div>

                </div>
            </div>

        </div>

    </div>

    <!-- DOCK -->
    <div class="position-fixed bottom-0 start-50 translate-middle-x mb-3 d-flex gap-3 px-3 py-2">
        <button class="btn btn-sm" onclick="executarComando('google')">🌐</button>
        <button class="btn btn-sm" onclick="executarComando('youtube')">▶️</button>
        <button class="btn btn-sm" onclick="executarComando('github')">💻</button>
    </div>

    <!-- JS -->
    <script src="/Brain/database.js"></script>
    <script src="/Brain/search.js"></script>
    <script src="/Brain/memory.js"></script>
    <script src="/Brain/utils.js"></script>
    <script src="/Brain/comandos.js"></script>
    <script src="/Brain/Brain.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
