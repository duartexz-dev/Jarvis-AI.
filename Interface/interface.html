<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/interfaceSystem.css">

    <title>JARVIS AI</title>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar px-4">
        <span id="welcome" class="fw-semibold"></span>

        <div class="ms-auto d-flex gap-2">
            <button class="btn btn-soft" onclick="ativarVoz()">🎤</button>
            <button class="btn btn-soft" onclick="location.reload()">🔄</button>
        </div>
    </nav>

    <!-- CONTAINER -->
    <div class="container-fluid mt-4">

        <div class="row g-4">

            <!-- SISTEMA -->
            <div class="col-lg-3 fade-in">
                <div class="glass-card p-3 h-100">

                    <h6 class="title">Sistema</h6>

                    <p id="Status">Inicializando...</p>

                    <div class="progress thin mt-2">
                        <div class="progress-bar"></div>
                    </div>

                    <div class="d-grid gap-2 mt-3">
                        <button class="btn btn-soft" onclick="executarComando('hora')">Hora</button>
                        <button class="btn btn-soft" onclick="executarComando('data')">Data</button>
                        <button class="btn btn-soft" onclick="executarComando('google')">Google</button>
                    </div>

                </div>
            </div>

            <!-- CORE -->
            <div class="col-lg-6 fade-in">
                <div class="glass-card p-4 h-100 d-flex flex-column">

                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="title">JARVIS</h5>
                        <span class="badge status">ONLINE</span>
                    </div>

                    <!-- CORE MINIMAL -->
                    <div class="core-minimal my-4"></div>

                    <p id="Status" class="text-center small">Sistema online</p>

                    <!-- INPUT -->
                    <div class="input-group mt-auto">
                        <input id="pedidoUser" class="form-control input-modern" placeholder="Digite um comando...">

                        <button class="btn btn-primary-soft" onclick="executarComando(pedidoUser.value)">Enviar</button>
                    </div>

                </div>
            </div>

            <!-- LOGS -->
            <div class="col-lg-3 fade-in">
                <div class="glass-card p-3 h-100">

                    <h6 class="title">Logs</h6>

                    <div class="log-box">
                        <table class="table table-sm">
                            <tbody id="logs"></tbody>
                        </table>
                    </div>

                    <button class="btn btn-soft w-100 mt-2" onclick="logs.innerHTML=''">Limpar</button>

                </div>
            </div>

        </div>
    </div>

    <!-- DOCK CLEAN -->
    <div class="dock-clean">
        <button onclick="executarComando('google')">🌐</button>
        <button onclick="executarComando('youtube')">▶️</button>
        <button onclick="executarComando('github')">💻</button>
    </div>

    <!-- SEUS SCRIPTS -->
    <script src="../Brain/database.js"></script>
    <script src="../Brain/search.js"></script>
    <script src="../Brain/memory.js"></script>
    <script src="../Brain/utils.js"></script>
    <script src="../Brain/comandos.js"></script>
    <script src="../Brain/Brain.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
